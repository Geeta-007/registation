<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>documnent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .gender {
            margin-top: 10px;
        }

        .gender label {
            display: inline;
            font-weight: normal;
            margin-right: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <form action="">
        <label>Full Name</label>
        <input type="text" name="fullname" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Re-enter Password</label>
        <input type="password" name="confirm_password" required>

        <label>Gender</label>
        <div class="gender">
            <input type="radio" value="m" name="gender"> Male
            <input type="radio" value="f" name="gender"> Female
        </div>

        <label>DOB</label>
        <input type="date">

        <label>Programming Language</label>
        <select>
            <option>Java</option>
            <option>C++</option>
            <option>Python</option>
            <option>Ruby</option>
        </select>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
    </style>
